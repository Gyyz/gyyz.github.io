    body {

      padding: 0;
      background: #f8f9fa;
      color: #333;
    }
    .header {
      text-align: center;
      padding: 20px 0 10px;

    .header a {

    }

      padding: 20px 24px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-left: 4px solid #336699;
      border-radius: 6px;
      text-decoration: none;
      color: #333;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .folder-list a:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      border-left-color: #0828FF;
    }
    .folder-name {
      font-size: 22px;
      font-weight: bold;
      color: #336699;
    }
